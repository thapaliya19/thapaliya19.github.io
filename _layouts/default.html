<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang | default: 'en' }}">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">


  <!-- Jekyll SEO Tag -->
  {% seo %}

  <!-- ─── Critical CSS (inline minimal rules for header/profileswitcher etc) ─── -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Source+Sans+3:wght@400;600;700&family=Fraunces:opsz,wght,SOFT@9..144,400..700,0..100&family=Noto+Serif+Devanagari:wght@400;600;700&family=Noto+Sans+Devanagari:wght@400;600;700&display=swap');

    :root {
      --bg: #f6f5f1;
      --bg-accent: #ebe9e2;
      --fg: #1a1a1a;
      --muted: #4a4a4a;
      --link: #1a4d57;
      --accent: #a8997d;
      --rule: rgba(26, 26, 26, 0.18);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1d1b18;
        --bg-accent: #14110d;
        --fg: #ece6da;
        --muted: #b8b0a2;
        --link: #8fc8c0;
        --accent: #b09b78;
        --rule: rgba(236, 230, 218, 0.20);
      }
    }

    /* 2. When the user explicitly chooses, we add .light or .dark to <html> */
    /* Explicit overrides for toggle */
    html.light {
      --bg: #f6f5f1;
      --bg-accent: #ebe9e2;
      --fg: #1a1a1a;
      --muted: #4a4a4a;
      --link: #1a4d57;
      --accent: #a8997d;
      --rule: rgba(26, 26, 26, 0.18);
    }

    html.dark {
      --bg: #1d1b18;
      --bg-accent: #14110d;
      --fg: #ece6da;
      --muted: #b8b0a2;
      --link: #8fc8c0;
      --accent: #b09b78;
      --rule: rgba(236, 230, 218, 0.20);
    }

    /* 3. Base rules use the vars */
    html {
      background: linear-gradient(180deg, var(--bg) 0%, var(--bg-accent) 100%);
      color: var(--fg);
      font-family: 'Source Serif 4', Georgia, 'Times New Roman', serif;
      line-height: 1.6;
      max-width: 52rem;
      margin: auto;
      padding: 1.25rem;
    }

    @media (max-width: 600px) {
      html {
        padding: 0.5em;
      }
    }

    /* Base avatar: square with softly rounded corners */
    .profile-img {
      display: block;
      width: 6em;
      height: 6em;
      object-fit: cover;
      border-radius: 0.6rem;
      /* <-- was 50% (circle), now rounded square */
      margin: 0 auto 1em;
      border: 1px solid var(--accent);
    }

    /* Larger screens: float + bigger square with same corner radius */
    @media (min-width: 600px) {
      html {
        max-width: 60rem;
      }

      .profile-img {
        float: right;
        width: 8em;
        height: 8em;
        margin: 0 0 1em 1.5em;
        object-fit: cover;
        border-radius: 0.6rem;
        /* <-- match the base rule */
      }
    }

    a {
      color: var(--link);
      text-decoration: none;
      transition: color 0.2s ease-in-out;
      background: transparent;

    }
  </style>

  <!-- ─── Preload & Deferred Main CSS ─── -->
  <link rel="preload" href="{{ '/assets/css/style.css' | relative_url }}" as="style">
  <link href="{{ '/assets/css/style.css' | relative_url }}" rel="stylesheet" media="print" onload="this.media='all'">
  <noscript>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  </noscript>


  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}">

</head>

<body>
  <main>
    {{ content }}
  </main>

  <footer>
    <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }} · Updated {{ site.time | date: '%b %Y' }} · Inspired by <a
        href="https://perfectmotherfuckingwebsite.com/">the perfect website</a>.
      {% if page.lang == 'en' %}
      <a href="/ne/" class="lang-btn" aria-label="Switch to Nepali">ने</a>
      {% else %}
      <a href="/" class="lang-btn" aria-label="Switch to English">En</a>
      {% endif %}
    </p>
  </footer>

  <!-- theme toggle button -->
  <button id="theme-toggle" aria-label="Toggle theme"></button>
  <!-- language toggle -->
  <!-- Language switcher -->

  <script>
    (function () {

      const btn = document.getElementById('theme-toggle');
      const root = document.documentElement;
      // 1. default to light unless user saved dark
      const stored = localStorage.getItem('theme');
      if (stored === 'dark') {
        root.classList.add('dark');
      } else {
        root.classList.add('light');
      }
      // 2. on click, flip light<->dark and persist
      if (btn) {
        btn.addEventListener('click', () => {
          if (root.classList.contains('dark')) {
            root.classList.replace('dark', 'light');
            localStorage.setItem('theme', 'light');
          } else {
            root.classList.replace('light', 'dark');
            localStorage.setItem('theme', 'dark');
          }
        });
      }

      // Hidden /ne/ style toggle: triple-click title to cycle torana -> dhaka -> paubha.
      if (root.lang !== 'ne') return;

      const vibeKey = 'ne-theme-vibe';
      const vibeOrder = ['torana', 'dhaka', 'paubha'];
      const params = new URLSearchParams(window.location.search);
      const queryVibe = (params.get('v') || '').toLowerCase();
      const storedVibe = (localStorage.getItem(vibeKey) || '').toLowerCase();

      function normalizeVibe(value) {
        return vibeOrder.includes(value) ? value : null;
      }

      const initialVibe = normalizeVibe(queryVibe) || normalizeVibe(storedVibe) || 'torana';
      root.dataset.neTheme = initialVibe;
      localStorage.setItem(vibeKey, initialVibe);

      const heading = document.querySelector('main h1');
      if (!heading) return;

      let clickCount = 0;
      let clickResetTimer = null;

      heading.addEventListener('click', () => {
        clickCount += 1;
        window.clearTimeout(clickResetTimer);
        clickResetTimer = window.setTimeout(() => {
          clickCount = 0;
        }, 700);

        if (clickCount < 3) return;

        clickCount = 0;
        const currentVibe = normalizeVibe(root.dataset.neTheme) || 'torana';
        const nextVibeIndex = (vibeOrder.indexOf(currentVibe) + 1) % vibeOrder.length;
        const nextVibe = vibeOrder[nextVibeIndex];
        root.dataset.neTheme = nextVibe;
        localStorage.setItem(vibeKey, nextVibe);
      });
    })();
  </script>

  <!-- open external links in new tab, but skip language switcher -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      document.querySelectorAll('a').forEach(a => {
        const href = a.getAttribute('href') || "";
        // skip anchors and our language‑switcher buttons
        if (href.startsWith("#") || a.classList.contains('lang-btn')) return;

        a.setAttribute('target', '_blank');
        a.setAttribute('rel', 'noopener noreferrer');
      });
    });
  </script>
</body>

</html>
